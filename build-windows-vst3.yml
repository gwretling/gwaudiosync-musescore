static void safe_copy (char* dst, size_t dstSize, const char* src)
{
    if (!dst || dstSize == 0)
        return;
    if (!src)
    {
        dst[0] = '\0';
        return;
    }
    strncpy (dst, src, dstSize - 1);
    dst[dstSize - 1] = '\0';
}

static void trim_inplace (char* s)
{
    if (!s)
        return;
    char* start = s;
    while (*start && isspace ((unsigned char)*start))
        ++start;
    if (start != s)
        memmove (s, start, strlen (start) + 1);
    size_t len = strlen (s);
    while (len > 0 && isspace ((unsigned char)s[len - 1]))
        s[--len] = '\0';
}

static void dirname_inplace (char* path)
{
#ifdef _WIN32
    char* slash = strrchr (path, '\\');
    char* slash2 = strrchr (path, '/');
    if (!slash || (slash2 && slash2 > slash))
        slash = slash2;
#else
    char* slash = strrchr (path, '/');
#endif
    if (slash)
        *slash = '\0';
}

static int is_absolute_path (const char* path)
{
#ifdef _WIN32
    return path && ((strlen(path) > 2 && path[1] == ':') || (path[0] == '\\' && path[1] == '\\'));
#else
    return path && path[0] == '/';
#endif
}

static int get_resources_dir (char* out, size_t outSize)
{
#ifdef _WIN32
    HMODULE module = NULL;
    char path[4096];
    if (!GetModuleHandleExA(GET_MODULE_HANDLE_EX_FLAG_FROM_ADDRESS | GET_MODULE_HANDLE_EX_FLAG_UNCHANGED_REFCOUNT,
                            (LPCSTR)&get_resources_dir, &module))
        return 0;
    DWORD len = GetModuleFileNameA(module, path, (DWORD)sizeof(path));
    if (len == 0 || len >= sizeof(path))
        return 0;
    dirname_inplace (path); // ...\Contents\x86_64-win
    dirname_inplace (path); // ...\Contents
    char resources[4096];
    snprintf (resources, sizeof (resources), "%s\\Resources", path);
    safe_copy (out, outSize, resources);
    return 1;
#else
    Dl_info info;
    if (dladdr ((void*)&get_resources_dir, &info) == 0 || !info.dli_fname)
        return 0;

    char path[4096];
    safe_copy (path, sizeof (path), info.dli_fname);
    dirname_inplace (path); // .../Contents/x86_64-linux
    dirname_inplace (path); // .../Contents

    char resources[4096];
    snprintf (resources, sizeof (resources), "%s/Resources", path);
    safe_copy (out, outSize, resources);
    return 1;
#endif
}

static uint16_t read_le16 (const unsigned char* p)
{
    return (uint16_t)(p[0] | (p[1] << 8));
}

static uint32_t read_le32 (const unsigned char* p)
{
    return (uint32_t)(p[0] | (p[1] << 8) | (p[2] << 16) | ((uint32_t)p[3] << 24));
}

static int load_wav_file (const char* path, AudioFileData* out)
{
    FILE* f = fopen (path, "rb");
    if (!f)
        return 0;

    unsigned char header[12];
    if (fread (header, 1, 12, f) != 12)
    {
        fclose (f);
        return 0;
    }
    if (memcmp (header, "RIFF", 4) != 0 || memcmp (header + 8, "WAVE", 4) != 0)
    {
        fclose (f);
        return 0;
    }

    uint16_t audioFormat = 0;
    uint16_t numChannels = 0;
    uint32_t sampleRate = 0;
    uint16_t bitsPerSample = 0;
    unsigned char* dataChunk = NULL;
    uint32_t dataSize = 0;

    while (!feof (f))
    {
        unsigned char chunkHeader[8];
        if (fread (chunkHeader, 1, 8, f) != 8)
            break;
        uint32_t chunkSize = read_le32 (chunkHeader + 4);

        if (memcmp (chunkHeader, "fmt ", 4) == 0)
        {
            unsigned char* fmt = (unsigned char*)malloc (chunkSize);
            if (!fmt)
                break;
            if (fread (fmt, 1, chunkSize, f) != chunkSize)
            {
                free (fmt);
                break;
            }
            if (chunkSize >= 16)
            {
                audioFormat = read_le16 (fmt + 0);
                numChannels = read_le16 (fmt + 2);
                sampleRate = read_le32 (fmt + 4);
                bitsPerSample = read_le16 (fmt + 14);
            }
            free (fmt);
        }
        else if (memcmp (chunkHeader, "data", 4) == 0)
        {
            dataChunk = (unsigned char*)malloc (chunkSize);
            if (!dataChunk)
                break;
            if (fread (dataChunk, 1, chunkSize, f) != chunkSize)
            {
                free (dataChunk);
                dataChunk = NULL;
                break;
            }
            dataSize = chunkSize;
        }
        else
        {
            fseek (f, chunkSize, SEEK_CUR);
        }

        if (chunkSize & 1)
            fseek (f, 1, SEEK_CUR);
    }

    fclose (f);

    if (!dataChunk || !numChannels || !sampleRate)
    {
        free (dataChunk);
        return 0;
    }

    int bytesPerSample = bitsPerSample / 8;
    if ((audioFormat != 1 && audioFormat != 3) || (bitsPerSample != 16 && bitsPerSample != 32))
    {
        free (dataChunk);
        return 0;
    }
    if (numChannels < 1 || numChannels > 2)
    {
        free (dataChunk);
        return 0;
    }

    int64_t totalSamples = dataSize / bytesPerSample;
    int64_t frames = totalSamples / numChannels;
    if (frames <= 0)
    {
        free (dataChunk);
        return 0;
    }

    float* samples = (float*)calloc ((size_t)(frames * numChannels), sizeof (float));
    if (!samples)
    {
        free (dataChunk);
        return 0;
    }

    if (audioFormat == 1 && bitsPerSample == 16)
    {
        const int16_t* src = (const int16_t*)dataChunk;
        for (int64_t i = 0; i < frames * numChannels; ++i)
            samples[i] = (float)src[i] / 32768.0f;
    }
    else if (audioFormat == 3 && bitsPerSample == 32)
    {
        const float* src = (const float*)dataChunk;
        memcpy (samples, src, (size_t)(frames * numChannels) * sizeof (float));
    }
    else if (audioFormat == 1 && bitsPerSample == 32)
    {
        const int32_t* src = (const int32_t*)dataChunk;
        for (int64_t i = 0; i < frames * numChannels; ++i)
            samples[i] = (float)((double)src[i] / 2147483648.0);
    }

    free (dataChunk);

    if (out->samples)
        free (out->samples);
    out->samples = samples;
    out->channels = numChannels;
    out->sampleRate = (int)sampleRate;
    out->frames = frames;
    out->loaded = 1;
    safe_copy (out->loadedPath, sizeof (out->loadedPath), path);
    return 1;
}

static void free_audio (AudioFileData* audio)
{
    if (audio->samples)
        free (audio->samples);
    memset (audio, 0, sizeof (*audio));
}

static int resolve_audio_path (char* outPath, size_t outSize)
{
    char resources[4096];
    if (!get_resources_dir (resources, sizeof (resources)))
        return 0;

    char configPath[4096];
#ifdef _WIN32
    snprintf (configPath, sizeof (configPath), "%s\\audio_path.txt", resources);
#else
    snprintf (configPath, sizeof (configPath), "%s/audio_path.txt", resources);
#endif
    FILE* cfg = fopen (configPath, "rb");
    if (cfg)
    {
        char buffer[4096];
        size_t n = fread (buffer, 1, sizeof (buffer) - 1, cfg);
        fclose (cfg);
        buffer[n] = '\0';
        trim_inplace (buffer);
        if (buffer[0])
        {
            if (is_absolute_path (buffer))
            {
                safe_copy (outPath, outSize, buffer);
                return 1;
            }
            char joined[4096];
#ifdef _WIN32
            snprintf (joined, sizeof (joined), "%s\\%s", resources, buffer);
#else
            snprintf (joined, sizeof (joined), "%s/%s", resources, buffer);
#endif
            safe_copy (outPath, outSize, joined);
            return 1;
        }
    }

#ifdef _WIN32
    snprintf (outPath, outSize, "%s\\audio.wav", resources);
#else
    snprintf (outPath, outSize, "%s/audio.wav", resources);
#endif
    return 1;
}

static int ensure_audio_loaded (GWAudioSyncAudioProcessor* instance)
{
    char path[4096];
    if (!resolve_audio_path (path, sizeof (path)))
        return 0;
    if (instance->audio.loaded && strcmp (instance->audio.loadedPath, path) == 0)
        return 1;
    return load_wav_file (path, &instance->audio);
}

static float sample_from_file (const AudioFileData* audio, int outChannel, double sourceFrame, Steinberg_TBool loopEnabled)
{
    if (!audio || !audio->loaded || !audio->samples || audio->frames <= 0)
        return 0.0f;

    if (loopEnabled)
    {
        double len = (double)audio->frames;
        while (sourceFrame < 0.0)
            sourceFrame += len;
        sourceFrame = fmod (sourceFrame, len);
    }
    else
    {
        if (sourceFrame < 0.0 || sourceFrame >= (double)(audio->frames - 1))
            return 0.0f;
    }

    int64_t i0 = (int64_t)floor (sourceFrame);
    int64_t i1 = i0 + 1;
    double frac = sourceFrame - (double)i0;

    if (loopEnabled)
        i1 %= audio->frames;
    else if (i1 >= audio->frames)
        i1 = audio->frames - 1;

    int srcChannels = audio->channels;
    int c = (srcChannels == 1) ? 0 : (outChannel < srcChannels ? outChannel : srcChannels - 1);

    float s0 = audio->samples[i0 * srcChannels + c];
    float s1 = audio->samples[i1 * srcChannels + c];
    return (float)((1.0 - frac) * s0 + frac * s1);
}

/* Processor methods */
Steinberg_uint32 SMTG_STDMETHODCALLTYPE Processor_AddRef (void* thisInterface)
{
    GWAudioSyncAudioProcessor* instance = (GWAudioSyncAudioProcessor*)thisInterface;
    instance->refCount += 1;
    return instance->refCount;
}
Steinberg_uint32 SMTG_STDMETHODCALLTYPE Processor_AddRef_ConnectionPoint (void* thisInterface)
{ return Processor_AddRef ((void*)((int64_t)thisInterface - pointerOffset)); }
Steinberg_uint32 SMTG_STDMETHODCALLTYPE Processor_AddRef_AudioProcessor (void* thisInterface)
{ return Processor_AddRef ((void*)((int64_t)thisInterface - (pointerOffset * 2))); }
Steinberg_uint32 SMTG_STDMETHODCALLTYPE Processor_AddRef_ProcessContextRequirements (void* thisInterface)
{ return Processor_AddRef ((void*)((int64_t)thisInterface - (pointerOffset * 3))); }

Steinberg_uint32 SMTG_STDMETHODCALLTYPE Processor_Release (void* thisInterface)
{
    GWAudioSyncAudioProcessor* instance = (GWAudioSyncAudioProcessor*)thisInterface;
    if (instance->refCount == 1)
    {
        free_audio (&instance->audio);
        free (instance);
        return 0;
    }
    instance->refCount -= 1;
    return instance->refCount;
}
Steinberg_uint32 SMTG_STDMETHODCALLTYPE Processor_Release_ConnectionPoint (void* thisInterface)
{ return Processor_Release ((void*)((int64_t)thisInterface - pointerOffset)); }
Steinberg_uint32 SMTG_STDMETHODCALLTYPE Processor_Release_AudioProcessor (void* thisInterface)
{ return Processor_Release ((void*)((int64_t)thisInterface - (pointerOffset * 2))); }
Steinberg_uint32 SMTG_STDMETHODCALLTYPE Processor_Release_ProcessContextRequirements (void* thisInterface)
{ return Processor_Release ((void*)((int64_t)thisInterface - (pointerOffset * 3))); }

Steinberg_tresult SMTG_STDMETHODCALLTYPE Processor_QueryInterface (void* thisInterface, const Steinberg_TUID iid, void** obj)
{
    GWAudioSyncAudioProcessor* instance = (GWAudioSyncAudioProcessor*)thisInterface;
    if (compare_iid (Steinberg_FUnknown_iid, iid) || compare_iid (Steinberg_IPluginBase_iid, iid) || compare_iid (Steinberg_Vst_IComponent_iid, iid))
    {
        Processor_AddRef (thisInterface);
        *obj = instance;
        return Steinberg_kResultTrue;
    }
    if (compare_iid (Steinberg_Vst_IConnectionPoint_iid, iid))
    {
        Processor_AddRef (thisInterface);
        *obj = (void*)((int64_t)instance + pointerOffset);
        return Steinberg_kResultTrue;
    }
    if (compare_iid (Steinberg_Vst_IAudioProcessor_iid, iid))
    {
        Processor_AddRef (thisInterface);
        *obj = (void*)((int64_t)instance + (pointerOffset * 2));
        return Steinberg_kResultTrue;
    }
    if (compare_iid (Steinberg_Vst_IProcessContextRequirements_iid, iid))
    {
        Processor_AddRef (thisInterface);
        *obj = (void*)((int64_t)instance + (pointerOffset * 3));
        return Steinberg_kResultTrue;
    }
    *obj = NULL;
    return Steinberg_kResultFalse;
}
Steinberg_tresult SMTG_STDMETHODCALLTYPE Processor_QueryInterface_ConnectionPoint (void* thisInterface, const Steinberg_TUID iid, void** obj)
{ return Processor_QueryInterface ((void*)((int64_t)thisInterface - pointerOffset), iid, obj); }
Steinberg_tresult SMTG_STDMETHODCALLTYPE Processor_QueryInterface_AudioProcessor (void* thisInterface, const Steinberg_TUID iid, void** obj)
{ return Processor_QueryInterface ((void*)((int64_t)thisInterface - (pointerOffset * 2)), iid, obj); }
Steinberg_tresult SMTG_STDMETHODCALLTYPE Processor_QueryInterface_ProcessContextRequirements (void* thisInterface, const Steinberg_TUID iid, void** obj)
{ return Processor_QueryInterface ((void*)((int64_t)thisInterface - (pointerOffset * 3)), iid, obj); }

