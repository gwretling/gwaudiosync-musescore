Steinberg_tresult SMTG_STDMETHODCALLTYPE Controller_GetParamStringByValue (void* thisInterface, Steinberg_Vst_ParamID id, Steinberg_Vst_ParamValue valueNormalized, Steinberg_Vst_String128 string)
{
    char buffer[32];
    if (id == kParamLoop)
        snprintf (buffer, sizeof (buffer), "%s", valueNormalized >= 0.5 ? "On" : "Off");
    else
        snprintf (buffer, sizeof (buffer), "%.2f", valueNormalized);
    for (size_t i = 0; i < strlen(buffer); ++i) string[i] = buffer[i];
    string[strlen(buffer)] = 0;
    return Steinberg_kResultOk;
}
