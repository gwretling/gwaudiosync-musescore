{ return type == Steinberg_Vst_MediaTypes_kEvent ? Steinberg_kResultFalse : Steinberg_kResultTrue; }
Steinberg_tresult SMTG_STDMETHODCALLTYPE Processor_SetActive (void* thisInterface, Steinberg_TBool state) { return Steinberg_kResultTrue; }
Steinberg_tresult SMTG_STDMETHODCALLTYPE Processor_SetState (void* thisInterface, struct Steinberg_IBStream* state)
{
    if (!state) return Steinberg_kInvalidArgument;
    GWAudioSyncAudioProcessor* instance = (GWAudioSyncAudioProcessor*)thisInterface;
    state->lpVtbl->read (state, &instance->gain, sizeof (instance->gain), NULL);
    state->lpVtbl->read (state, &instance->loopEnabled, sizeof (instance->loopEnabled), NULL);
    return Steinberg_kResultOk;
}
Steinberg_tresult SMTG_STDMETHODCALLTYPE Processor_GetState (void* thisInterface, struct Steinberg_IBStream* state)
{
    if (!state) return Steinberg_kInvalidArgument;
    GWAudioSyncAudioProcessor* instance = (GWAudioSyncAudioProcessor*)thisInterface;
    state->lpVtbl->write (state, &instance->gain, sizeof (instance->gain), NULL);
    state->lpVtbl->write (state, &instance->loopEnabled, sizeof (instance->loopEnabled), NULL);
    return Steinberg_kResultOk;
}
Steinberg_tresult SMTG_STDMETHODCALLTYPE Processor_SetBusArrangements (void* thisInterface, Steinberg_Vst_SpeakerArrangement* inputs, Steinberg_int32 numIns, Steinberg_Vst_SpeakerArrangement* outputs, Steinberg_int32 numOuts)
{
    if (numIns != 1 || numOuts != 1) return Steinberg_kResultFalse;
    if (inputs[0] != Steinberg_Vst_SpeakerArr_kStereo || outputs[0] != Steinberg_Vst_SpeakerArr_kStereo) return Steinberg_kResultFalse;
    return Steinberg_kResultTrue;
}
Steinberg_tresult SMTG_STDMETHODCALLTYPE Processor_GetBusArrangement (void* thisInterface, Steinberg_Vst_BusDirection dir, Steinberg_int32 index, Steinberg_Vst_SpeakerArrangement* arr)
{
    if (index != 0) return Steinberg_kInvalidArgument;
    *arr = Steinberg_Vst_SpeakerArr_kStereo;
    return Steinberg_kResultTrue;
}
