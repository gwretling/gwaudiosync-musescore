    return type == Steinberg_Vst_MediaTypes_kAudio ? 1 : 0;
}
Steinberg_tresult SMTG_STDMETHODCALLTYPE Processor_GetBusInfo (void* thisInterface, Steinberg_Vst_MediaType type, Steinberg_Vst_BusDirection dir, Steinberg_int32 index, struct Steinberg_Vst_BusInfo* bus)
{
    if (type == Steinberg_Vst_MediaTypes_kEvent || index != 0)
        return Steinberg_kResultFalse;
    static const Steinberg_char16 name_string[] = {'A','u','d','i','o',0};
    memcpy (bus->name, name_string, sizeof (name_string));
    bus->channelCount = 2;
    bus->flags = Steinberg_Vst_BusInfo_BusFlags_kDefaultActive;
    bus->direction = dir;
    bus->mediaType = type;
    bus->busType = Steinberg_Vst_BusTypes_kMain;
    return Steinberg_kResultTrue;
}
Steinberg_tresult SMTG_STDMETHODCALLTYPE Processor_GetRoutingInfo (void* thisInterface, struct Steinberg_Vst_RoutingInfo* inInfo, struct Steinberg_Vst_RoutingInfo* outInfo) { return Steinberg_kNotImplemented; }
