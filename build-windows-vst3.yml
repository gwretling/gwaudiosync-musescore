Steinberg_tresult SMTG_STDMETHODCALLTYPE Controller_GetParameterInfo (void* thisInterface, Steinberg_int32 paramIndex, struct Steinberg_Vst_ParameterInfo* info)
{
    if (paramIndex == 0)
    {
        info->id = kParamGain; info->stepCount = 0; info->flags = Steinberg_Vst_ParameterInfo_ParameterFlags_kCanAutomate; info->defaultNormalizedValue = 1.0; info->unitId = Steinberg_Vst_kRootUnitId;
        static const Steinberg_char16 title[] = {'A','u','d','i','o',' ','G','a','i','n',0};
        static const Steinberg_char16 units[] = {'x',0};
        memcpy (info->title, title, sizeof (title)); memcpy (info->units, units, sizeof (units));
        return Steinberg_kResultTrue;
    }
    if (paramIndex == 1)
    {
        info->id = kParamLoop; info->stepCount = 1; info->flags = Steinberg_Vst_ParameterInfo_ParameterFlags_kCanAutomate | Steinberg_Vst_ParameterInfo_ParameterFlags_kIsList; info->defaultNormalizedValue = 0.0; info->unitId = Steinberg_Vst_kRootUnitId;
        static const Steinberg_char16 title[] = {'L','o','o','p',0};
        memcpy (info->title, title, sizeof (title)); info->units[0] = 0;
        return Steinberg_kResultTrue;
    }
    return Steinberg_kInvalidArgument;
}
