        return p->componentVtbl->queryInterface (p, iid, obj);
    }
    if (compare_iid (cid, factory->classes[1].cid))
    {
        GWAudioSyncEditController* c = (GWAudioSyncEditController*)calloc (1, sizeof (*c));
        c->editControllerVtbl = &kControllerVtbl.editController; c->connectionPointVtbl = &kControllerVtbl.connectionPoint; c->editController2Vtbl = &kControllerVtbl.editController2; c->gainParam = 1.0; c->loopParam = 0.0; c->refCount = 0;
