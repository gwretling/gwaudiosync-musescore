Steinberg_tresult SMTG_STDMETHODCALLTYPE Processor_Process (void* thisInterface, struct Steinberg_Vst_ProcessData* data)
{
    GWAudioSyncAudioProcessor* instance = (GWAudioSyncAudioProcessor*)((int64_t)thisInterface - (pointerOffset * 2));

    if (data && data->inputParameterChanges)
    {
        Steinberg_int32 numParamsChanged = data->inputParameterChanges->lpVtbl->getParameterCount (data->inputParameterChanges);
        for (Steinberg_int32 i = 0; i < numParamsChanged; ++i)
        {
            Steinberg_Vst_IParamValueQueue* q = data->inputParameterChanges->lpVtbl->getParameterData (data->inputParameterChanges, i);
            if (!q) continue;
            Steinberg_int32 points = q->lpVtbl->getPointCount (q);
            if (points <= 0) continue;
            Steinberg_int32 sampleOffset = 0;
            Steinberg_Vst_ParamValue value = 0.0;
            if (q->lpVtbl->getPoint (q, points - 1, &sampleOffset, &value) != Steinberg_kResultTrue)
                continue;
            Steinberg_Vst_ParamID pid = q->lpVtbl->getParameterId (q);
            if (pid == kParamGain)
                instance->gain = (float)value;
            else if (pid == kParamLoop)
                instance->loopEnabled = value >= 0.5 ? 1 : 0;
        }
    }

    if (!data || data->numSamples <= 0 || !data->outputs)
        return Steinberg_kResultTrue;

    int numOutChannels = data->outputs[0].numChannels;
    for (int ch = 0; ch < numOutChannels; ++ch)
    {
        float* out = data->outputs[0].Steinberg_Vst_AudioBusBuffers_channelBuffers32[ch];
        float* in = NULL;
        if (data->inputs && data->inputs[0].numChannels > 0)
        {
            int inCh = ch < data->inputs[0].numChannels ? ch : data->inputs[0].numChannels - 1;
            in = data->inputs[0].Steinberg_Vst_AudioBusBuffers_channelBuffers32[inCh];
        }
        for (int i = 0; i < data->numSamples; ++i)
            out[i] = in ? in[i] : 0.0f;
    }

    if (!(data->processContext && (data->processContext->state & Steinberg_Vst_ProcessContext_StatesAndFlags_kPlaying)))
        return Steinberg_kResultTrue;

    if (!ensure_audio_loaded (instance) || !instance->audio.loaded || instance->hostSampleRate <= 0.0)
        return Steinberg_kResultTrue;

    double ratio = (double)instance->audio.sampleRate / instance->hostSampleRate;
    double startFrame = data->processContext->projectTimeSamples * ratio;

    for (int i = 0; i < data->numSamples; ++i)
    {
        double srcFrame = startFrame + (double)i * ratio;
        for (int ch = 0; ch < numOutChannels; ++ch)
        {
            float wet = sample_from_file (&instance->audio, ch, srcFrame, instance->loopEnabled);
            data->outputs[0].Steinberg_Vst_AudioBusBuffers_channelBuffers32[ch][i] += wet * instance->gain;
        }
    }

    return Steinberg_kResultTrue;
}

